name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - run: npm ci
    
    - name: Type checking & Lint (If available)
      run: tsc --noEmit || true
      
    - name: Production Build
      run: npm run build
      
    - name: Build Docker Image
      run: docker build -t papercreeper-ai:latest .
