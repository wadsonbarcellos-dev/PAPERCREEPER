version: '3.8'

services:
  papercreeper:
    build: .
    container_name: papercreeper-ai
    ports:
      - "3000:3000"
      - "25565-25575:25565-25575" # Intervalo para servidores minecraft iterativos
    volumes:
      - ./servers:/app/servers
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 4G
